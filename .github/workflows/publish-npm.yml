# Publishes on GitHub Release.
#
# Trusted publishing (recommended): On npm → nugit-cli → Settings → Trusted publishing,
# add GitHub Actions with workflow filename exactly: publish-npm.yml (this file).
# OIDC is used first; npm falls back to NODE_AUTH_TOKEN if OIDC is not available.
#
# Requires: npm CLI ≥ 11.5.1, Node ≥ 22.14 (see https://docs.npmjs.com/trusted-publishers )
# NPM_TOKEN secret: optional fallback (e.g. Automation classic token) if trusted publishing fails.

name: Publish CLI to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set package version from release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Release tag must be a semver (optionally prefixed with v), got: $TAG_NAME"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
